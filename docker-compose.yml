services:
  postgres:
    image: postgres:16-alpine
    container_name: neuralv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: neuralv-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      UPLOAD_DIR: /app/uploads
      SUPPORT_INTERNAL_TOKEN: ${SUPPORT_INTERNAL_TOKEN}
      SUPPORT_MESSAGE_COOLDOWN_MS: 5000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      VT_API_KEY: ${VT_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE}
      REGISTRATION_CODE_TTL_MINUTES: ${REGISTRATION_CODE_TTL_MINUTES}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
    volumes:
      - backend_uploads:/app/uploads

  telegram-bot:
    build:
      context: ./telegram-support-bot
    container_name: neuralv-telegram-bot
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BACKEND_INTERNAL_URL: http://backend:3000/api/internal/support
      SUPPORT_INTERNAL_TOKEN: ${SUPPORT_INTERNAL_TOKEN}
      POLL_INTERVAL_SECONDS: 2

  frontend:
    build:
      context: ./react-site
    container_name: neuralv-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  postgres_data:
  backend_uploads:
